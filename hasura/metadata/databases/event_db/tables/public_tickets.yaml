table:
  name: tickets
  schema: public
object_relationships:
  - name: event
    using:
      foreign_key_constraint_on: event_id
  - name: payment
    using:
      foreign_key_constraint_on: payment_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - created_at
        - event_id
        - id
        - payment_id
        - quantity
        - status
        - total_price
        - updated_at
    comment: ""
select_permissions:
  - role: anonymous
    permission:
      columns:
        - event_id
        - status
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: user
    permission:
      columns:
        - status
        - quantity
        - total_price
        - created_at
        - updated_at
        - event_id
        - id
        - payment_id
        - user_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      allow_aggregations: true
    comment: ""
