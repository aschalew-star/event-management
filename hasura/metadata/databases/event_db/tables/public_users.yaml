table:
  name: users
  schema: public
array_relationships:
  - name: bookmarks
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: bookmarks
          schema: public
  - name: events
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: events
          schema: public
  - name: follows
    using:
      foreign_key_constraint_on:
        column: followed_user_id
        table:
          name: follows
          schema: public
  - name: followsByFollowerId
    using:
      foreign_key_constraint_on:
        column: follower_id
        table:
          name: follows
          schema: public
  - name: payments
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: payments
          schema: public
  - name: tickets
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: tickets
          schema: public
select_permissions:
  - role: anonymous
    permission:
      columns:
        - avatar_url
        - bio
        - created_at
        - id
        - name
        - updated_at
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - avatar_url
        - bio
        - created_at
        - email
        - id
        - name
        - password
        - role
        - updated_at
      filter: {}
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: anonymous
    permission:
      columns:
        - avatar_url
        - email
        - name
        - password
        - role
        - bio
        - created_at
        - updated_at
        - id
      filter:
        id:
          _eq: X-Hasura-User-Id
      check: null
    comment: ""
  - role: user
    permission:
      columns:
        - avatar_url
        - email
        - name
        - password
        - role
        - bio
        - created_at
        - updated_at
        - id
      filter:
        id:
          _eq: X-Hasura-User-Id
      check: null
      set:
        id: x-hasura-User-Id
    comment: ""
