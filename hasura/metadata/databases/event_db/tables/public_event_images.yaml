table:
  name: event_images
  schema: public
object_relationships:
  - name: event
    using:
      foreign_key_constraint_on: event_id
insert_permissions:
  - role: user
    permission:
      check:
        event:
          user_id:
            _eq: X-Hasura-User-Id
      columns:
        - is_featured
        - image_url
        - created_at
        - event_id
        - id
    comment: ""
select_permissions:
  - role: anonymous
    permission:
      columns:
        - is_featured
        - image_url
        - created_at
        - event_id
        - id
      filter:
        event:
          status:
            _eq: published
    comment: ""
  - role: user
    permission:
      columns:
        - is_featured
        - image_url
        - created_at
        - event_id
        - id
      filter:
        _or:
          - event:
              status:
                _eq: published
          - event:
              user_id:
                _eq: X-Hasura-User-Id
    comment: ""
update_permissions:
  - role: anonymous
    permission:
      columns: []
      filter: {}
      check: null
    comment: ""
  - role: user
    permission:
      columns:
        - is_featured
        - image_url
        - created_at
        - event_id
        - id
      filter:
        event:
          user_id:
            _eq: X-Hasura-User-Id
      check: null
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        event:
          user_id:
            _eq: X-Hasura-User-Id
    comment: ""
