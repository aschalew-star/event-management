type Mutation {
  createEvent(
    input: CreateEventInput!
  ): EventResponse
}

type Mutation {
  loginUser(
    input: LoginUserInput!
  ): AuthResponse
}

type Mutation {
  processChapaPayment(
    input: ProcessChapaPaymentInput!
  ): ProcessChapaPaymentResponse
}

type Mutation {
  registerUser(
    input: RegisterUserInput!
  ): AuthResponse
}

type Mutation {
  uploadEventImages(
    event_id: uuid!
    images: [String!]!
  ): UploadResponse
}

type Mutation {
  verifyChapaPayment(
    input: VerifyChapaPaymentInput!
  ): VerifyChapaPaymentResponse
}

input RegisterUserInput {
  name: String!
  email: String!
  password: String!
}

input LoginUserInput {
  email: String!
  password: String!
}

input CreateEventInput {
  title: String!
  description: String
  category_id: uuid
  price: Float
  is_free: Boolean
  venue: String
  address: String
  latitude: Float
  longitude: Float
  event_date: timestamp
  start_time: String
  end_time: String
  status: String
  featured_image: String
  images: [String!]!
  tags: [String!]
}

input ProcessChapaPaymentInput {
  eventId: String!
  quantity: Int!
  email: String!
  phone: String!
  firstName: String!
  lastName: String!
}

input VerifyChapaPaymentInput {
  transactionRef: String!
}

type AuthResponse {
  token: String!
  user_id: String!
  message: String!
}

type EventResponse {
  id: uuid!
  message: String!
  success: Boolean!
  featured_image: String
}

type UploadResponse {
  success: Boolean!
  message: String!
  urls: [String!]!
}

type ProcessChapaPaymentResponse {
  success: Boolean!
  message: String!
  data: ChapaPaymentData!
}

type ChapaPaymentData {
  checkout_url: String!
  transaction_ref: String!
}

type VerifyChapaPaymentResponse {
  success: Boolean!
  message: String!
  status: String!
  ticket: TicketData
}

type TicketData {
  id: String!
  event_id: String!
  quantity: Int!
  total_price: Float!
  status: String!
}

