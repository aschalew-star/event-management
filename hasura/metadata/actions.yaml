actions:
  - name: createEvent
    definition:
      kind: synchronous
      handler: http://172.17.0.1:4000/api/events
      forward_client_headers: true
    permissions:
      - role: user
  - name: loginUser
    definition:
      kind: synchronous
      handler: http://172.17.0.1:4000/auth/login
      forward_client_headers: true
    permissions:
      - role: anonymous
  - name: processChapaPayment
    definition:
      kind: synchronous
      handler: http://172.17.0.1:4000/api/payment/initialize
      forward_client_headers: true
    permissions:
      - role: user
  - name: registerUser
    definition:
      kind: synchronous
      handler: http://172.17.0.1:4000/auth/register
      forward_client_headers: true
    permissions:
      - role: anonymous
  - name: uploadEventImages
    definition:
      kind: synchronous
      handler: http://172.17.0.1:4000/api/events/images
      forward_client_headers: true
    permissions:
      - role: user
  - name: verifyChapaPayment
    definition:
      kind: synchronous
      handler: http://172.17.0.1:4000/api/payment/verify
      forward_client_headers: true
    permissions:
      - role: user
      - role: anonymous
custom_types:
  enums: []
  input_objects:
    - name: RegisterUserInput
    - name: LoginUserInput
    - name: CreateEventInput
    - name: ProcessChapaPaymentInput
    - name: VerifyChapaPaymentInput
  objects:
    - name: AuthResponse
    - name: EventResponse
    - name: UploadResponse
    - name: ProcessChapaPaymentResponse
    - name: ChapaPaymentData
    - name: VerifyChapaPaymentResponse
    - name: TicketData
  scalars: []
