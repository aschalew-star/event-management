table:
  name: follows
  schema: public
object_relationships:
  - name: event
    using:
      foreign_key_constraint_on: event_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
    - role: anonymous
      permission:
        check: {}
        columns:
          - id
          - user_id
          - event_id
          - created_at
      comment: "Allow anonymous users to insert follows"
    - role: user
      permission:
        check: {}
        columns:
          - id
          - user_id
          - event_id
          - created_at
      comment: "Allow authenticated users to insert follows"
select_permissions:
    - role: anonymous
      permission:
        columns:
          - id
          - user_id
          - event_id
          - created_at
        filter: {}
      comment: "Allow anonymous users to select follows"
    - role: user
      permission:
        columns:
          - id
          - user_id
          - event_id
          - created_at
        filter: {}
      comment: "Allow authenticated users to select follows"
update_permissions:
    - role: anonymous
      permission:
        columns:
          - id
          - user_id
          - event_id
          - created_at
        filter: {}
        check: null
      comment: "Allow anonymous users to update follows"
    - role: user
      permission:
        columns:
          - id
          - user_id
          - event_id
          - created_at
        filter: {}
        check: null
      comment: "Allow authenticated users to update follows"
delete_permissions:
    - role: anonymous
      permission:
        filter: {}
      comment: "Allow anonymous users to delete follows"
    - role: user
      permission:
        filter: {}
      comment: "Allow authenticated users to delete follows"