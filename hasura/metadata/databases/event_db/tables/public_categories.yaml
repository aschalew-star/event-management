table:
  name: categories
  schema: public
array_relationships:
  - name: events
    using:
      foreign_key_constraint_on:
        column: category_id
        table:
          name: events
          schema: public
select_permissions:
  - role: anonymous
    permission:
      columns:
        - color
        - icon
        - name
        - description
        - created_at
        - updated_at
        - id
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - color
        - icon
        - name
        - description
        - created_at
        - updated_at
        - id
      filter: {}
    comment: ""
