# ✅ KEEP THIS AS IS - DO NOT MODIFY
input RegisterUserInput {
  name: String!
  email: String!
  password: String!
}

input LoginUserInput {
  email: String!
  password: String!
}

# 🔴 WE NEED TO MODIFY THIS - ADD featured_image
input CreateEventInput {
  title: String!
  description: String
  category_id: uuid
  price: Float
  is_free: Boolean
  venue: String
  address: String
  latitude: Float
  longitude: Float
  event_date: timestamp
  start_time: String
  end_time: String
  status: String
  featured_image: String   # 🔴 ADD THIS - base64 image data
  tags: [String!]          # 🔴 ADD THIS - tags array
}

type AuthResponse {
  token: String!
  user_id: String!
  message: String!
}

# 🔴 MODIFY EventResponse - add featured_image
type EventResponse {
  id: uuid!
  message: String!
  success: Boolean!        # 🔴 ADD THIS
  featured_image: String   # 🔴 ADD THIS
}

type UploadResponse {
  success: Boolean!
  message: String!
  urls: [String!]!
}

type Mutation {
  registerUser(input: RegisterUserInput!): AuthResponse
  loginUser(input: LoginUserInput!): AuthResponse
  createEvent(input: CreateEventInput!): EventResponse
  uploadEventImages(event_id: uuid!, images: [String!]!): UploadResponse
}