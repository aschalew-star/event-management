table:
  name: follows
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: followed_user_id
  - name: userByFollowerId
    using:
      foreign_key_constraint_on: follower_id
insert_permissions:
  - role: user
    permission:
      check: {}
      set:
        follower_id: x-hasura-User-Id
      columns:
        - created_at
        - followed_user_id
        - id
    comment: ""
select_permissions:
  - role: anonymous
    permission:
      columns: []
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: user
    permission:
      columns:
        - created_at
        - followed_user_id
        - follower_id
        - id
      filter:
        _or:
          - follower_id:
              _eq: X-Hasura-User-Id
          - followed_user_id:
              _eq: X-Hasura-User-Id
      allow_aggregations: true
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        follower_id:
          _eq: X-Hasura-User-Id
    comment: ""
