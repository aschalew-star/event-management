type Mutation {
  createEvent(input: CreateEventInput!): EventResponse
  loginUser(input: LoginUserInput!): AuthResponse
  registerUser(input: RegisterUserInput!): AuthResponse
  uploadEventImages(event_id: uuid!, images: [String!]!): UploadResponse
  processChapaPayment(input: ProcessChapaPaymentInput!): ProcessChapaPaymentResponse
  verifyChapaPayment(input: VerifyChapaPaymentInput!): VerifyChapaPaymentResponse
}

# --- Core Inputs (Untouched) ---

input RegisterUserInput {
  name: String!
  email: String!
  password: String!
}

input LoginUserInput {
  email: String!
  password: String!
}

input CreateEventInput {
  title: String!
  description: String
  category_id: uuid
  price: Float
  is_free: Boolean
  venue: String
  address: String
  latitude: Float
  longitude: Float
  event_date: timestamp
  start_time: String
  end_time: String
  status: String
  featured_image: String
  tags: [String!]
}

# --- Fixed Chapa Payment Inputs ---

input ProcessChapaPaymentInput {
  eventId: String!
  quantity: Int!
  email: String!
  phone: String!
  firstName: String!
  lastName: String!
}

input VerifyChapaPaymentInput {
  transactionRef: String!
}

# --- Core Responses (Untouched) ---

type AuthResponse {
  token: String!
  user_id: String!
  message: String!
}

type EventResponse {
  id: uuid!
  message: String!
  success: Boolean!
  featured_image: String
}

type UploadResponse {
  success: Boolean!
  message: String!
  urls: [String!]!
}

# --- Fixed Chapa Payment Responses ---

type ProcessChapaPaymentResponse {
  success: Boolean!
  message: String!
  data: ChapaPaymentData!
}

type ChapaPaymentData {
  checkout_url: String!
  transaction_ref: String!
}

type VerifyChapaPaymentResponse {
  success: Boolean!
  message: String!
  status: String!
  ticket: TicketData
}

type TicketData {
  id: String!
  event_id: String!
  quantity: Int!
  total_price: Float!
  status: String!
}