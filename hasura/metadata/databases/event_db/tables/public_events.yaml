table:
  name: events
  schema: public
object_relationships:
  - name: category
    using:
      foreign_key_constraint_on: category_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: bookmarks
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: bookmarks
          schema: public
  - name: event_images
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: event_images
          schema: public
  - name: event_tags
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: event_tags
          schema: public
  - name: tickets
    using:
      foreign_key_constraint_on:
        column: event_id
        table:
          name: tickets
          schema: public
insert_permissions:
  - role: user
    permission:
      check: {}
      set:
        user_id: x-hasura-User-Id
      columns:
        - address
        - category_id
        - created_at
        - description
        - end_time
        - event_date
        - id
        - is_free
        - latitude
        - longitude
        - price
        - start_time
        - status
        - title
        - updated_at
        - venue
        - view_count
    comment: ""
select_permissions:
  - role: anonymous
    permission:
      columns:
        - address
        - category_id
        - created_at
        - description
        - end_time
        - event_date
        - id
        - is_free
        - latitude
        - longitude
        - price
        - start_time
        - status
        - title
        - updated_at
        - venue
        - view_count
      filter:
        status:
          _eq: published
      allow_aggregations: true
    comment: ""
  - role: user
    permission:
      columns:
        - is_free
        - end_time
        - start_time
        - status
        - title
        - venue
        - view_count
        - latitude
        - longitude
        - price
        - address
        - description
        - created_at
        - event_date
        - updated_at
        - category_id
        - id
        - user_id
      filter:
        _or:
          - user_id:
              _eq: X-Hasura-User-Id
          - status:
              _eq: published
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - address
        - category_id
        - created_at
        - description
        - end_time
        - event_date
        - id
        - is_free
        - latitude
        - longitude
        - price
        - start_time
        - status
        - title
        - updated_at
        - venue
        - view_count
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check: null
      set:
        user_id: x-hasura-User-Id
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
